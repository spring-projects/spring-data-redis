name: Snapshots

on:
  workflow_dispatch:
  push:
    branches: [ 4.0.x, 'issue/4.0.x/**' ]

permissions: read-all

jobs:
  build-snapshots:
    name: Build and deploy snapshots
    if: ${{ github.repository_owner == 'spring-projects' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java and Maven
        uses: spring-projects/spring-data-build/actions/setup-maven@4.0.x
        with:
          develocity-access-key: '${{ secrets.DEVELOCITY_ACCESS_KEY }}'
      - name: Setup Redis
        uses: ./.github/actions/setup-redis/
        with:
          version: latest
      - name: Deploy to Artifactory
        uses: spring-projects/spring-data-build/actions/maven-artifactory-deploy@4.0.x
        with:
          build-name: 'spring-data-redis'
          username: '${{ secrets.ARTIFACTORY_USERNAME }}'
          password: '${{ secrets.ARTIFACTORY_PASSWORD }}'
