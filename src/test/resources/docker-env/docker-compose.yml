services:
  ##############################
  # STANDALONE (Ports 6379-6381)
  ##############################
  standalone:
    build:
      context: ./standalone
      args:
        - IMAGE=${IMAGE}
    container_name: standalone
    ports:
      - "6379:6379"
      - "6380:6380"
      - "6381:6381"
      - "26379:26379"
      - "26380:26380"
      - "26381:26381"
    tmpfs:
      - /data
    volumes:
      - ${WORK_DIR}:/sock
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  #  #############################
  #  # Auth (Ports 6382 and 26382)
  #  #############################
  auth:
    build:
      context: ./auth
      args:
        - IMAGE=${IMAGE}
    container_name: auth
    ports:
      - "6382:6382"
      - "26382:26382"
    tmpfs:
      - /data
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6382", "-a", "foobared", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  #  ###########################
  #  # Cluster (Ports 7379-7382)
  #  ###########################
  cluster:
    build:
      context: ./cluster
      args:
        - IMAGE=${IMAGE}
    container_name: cluster
    ports:
      - "7379:7379"
      - "7380:7380"
      - "7381:7381"
      - "7382:7382"
    tmpfs:
      - /data
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "7379", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5